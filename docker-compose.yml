services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: belgrade_atc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: BelgradeATC.API/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=belgrade_atc;Username=postgres;Password=postgres
      - ParkingConfig__AirlinerSpots=5
      - ParkingConfig__PrivateSpots=10

volumes:
  postgres_data:
